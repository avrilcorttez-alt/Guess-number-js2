<!DOCTYPE html>
<html lang="es">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adivina el Número</title>
  <style>
    *  {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Press Start 2P', cursive;
  background: linear-gradient(180deg, #5b5bd6, #3b3bb3);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* TARJETA PIXEL */
.game-card {
  background: #2d2da8;
  border: 4px solid #1b1b5e;
  border-radius: 12px;
  padding: 30px;
  width: 380px;
  text-align: center;
  box-shadow: 0 10px 0 #1b1b5e;
}

/* TÍTULO PIXEL */
h1 {
  font-size: 16px;
  margin-bottom: 10px;
  letter-spacing: 2px;
}

.subtitle {
  font-size: 10px;
  margin-bottom: 20px;
  color: #cfcfff;
}

/* INPUT */
input {
  font-family: inherit;
  padding: 12px;
  width: 100px;
  text-align: center;
  background: #cfd8ff;
  border: 3px solid #1b1b5e;
  color: black;
  font-size: 14px;
  outline: none;
}

/* BOTÓN PIXEL */
button {
  font-family: inherit;
  padding: 12px 18px;
  background: #dfe6ff;
  border: 3px solid #1b1b5e;
  color: black;
  cursor: pointer;
  box-shadow: 4px 4px 0 #1b1b5e;
  transition: all 0.1s ease;
}

button:hover {
  transform: translate(-2px, -2px);
  box-shadow: 6px 6px 0 #1b1b5e;
}

button:active {
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 #1b1b5e;
}

/* MENSAJE */
#mensaje {
  margin: 20px 0;
  font-size: 12px;
  min-height: 30px;
}

/* CONTADOR */
#contador {
  font-size: 10px;
}

/* MEJOR PUNTAJE */
#mejorPuntaje {
  font-size: 10px;
  margin-top: 10px;
  color: #ffccff;
}

/* HISTORIAL COMO CORAZONES */
.historial {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 15px;
}

.guess-pill {
  width: 14px;
  height: 14px;
  background: pink;
  clip-path: polygon(
    50% 0%,
    61% 10%,
    75% 10%,
    85% 20%,
    85% 35%,
    50% 70%,
    15% 35%,
    15% 20%,
    25% 10%,
    39% 10%
  );
}

/* BOTÓN REINICIAR */
#btnReiniciar {
  margin-top: 20px;
  background: #ffd6e7;
}

/* RESPONSIVE */
@media (max-width: 480px) {
  .game-card {
    width: 90%;
  }
}
  </style>
</head>
<body>
  <div class="game-card" id="game-card">
    <h1>🎯 Adivina el Número</h1>
    <p class="subtitle">Estoy pensando en un número del 1 al 100...</p>

    <div class="controls">
      <input type="number" id="inputIntento" min="1" max="100" placeholder="?">
      <button id="btnAdivinar">Adivinar</button>
    </div>

    <p id="mensaje"></p>
    <p id="contador">Intentos: 0</p>
    <p id="mejorPuntaje"></p>
    <div id="historial" class="historial"></div>

    <button id="btnReiniciar" style="display: none;">
      🔄 Jugar de nuevo
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
